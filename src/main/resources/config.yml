prefix: "<green>[Dupe++]<white> " # the prefix displayed infront of messages (uses minimessage format https://docs.papermc.io/adventure/minimessage/)
checkenchantments: true # decides whether the enchantment blacklist gets checked when duping
checkdata: true # decides whether it checks the extra data added to an item after using /nondupeable
guititle: "<green>DupePlusPlus GUI" # the title of the gui in /blacklist list
blacklist: true # whether it should use whitelist or blacklist


#  ╭━━━╮
